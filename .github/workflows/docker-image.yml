name: docker-image

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image for smoke tests
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: genetic-support-tool:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container smoke tests
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docker-ci-output
          docker run --rm -v "${PWD}/docker-ci-output:/work" genetic-support-tool:ci burden --config config/default.yaml
          docker run --rm -v "${PWD}/docker-ci-output:/work" genetic-support-tool:ci skato --config config/default.yaml
          docker run --rm -v "${PWD}/docker-ci-output:/work" genetic-support-tool:ci quant-assoc --config config/quant_assoc_plink2_example.yaml

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
