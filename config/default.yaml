project:
  name: demo_genetic_support

analysis:
  method: burden

input:
  genotype_matrix: data/example/geno_matrix.tsv
  phenotype_file: data/example/pheno.tsv
  covariate_file: data/example/covar.tsv

phenotype:
  name: phenotype
  type: continuous

burden:
  set_id: DEMO_GENE
  engine: skat
  covariates:
    - age
    - sex
    - PC1
    - PC2

skato:
  set_id: DEMO_GENE
  engine: skat
  covariates:
    - age
    - sex
    - PC1
    - PC2

regenie:
  genotype_format: pfile

quant_assoc:
  engine: plink2
  plink2_bin: plink2
  covar_variance_standardize: true
  covariates:
    - age
    - sex
    - PC1
    - PC2

output:
  root_dir: output
